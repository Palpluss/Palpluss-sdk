[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "palpluss"
version = "0.1.0"
description = "Official PalPluss Python SDK"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
keywords = ["palpluss", "mpesa", "payments", "kenya", "sdk"]
dependencies = [
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-httpx>=0.30.0",
    "mypy>=1.9.0",
    "ruff>=0.4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["palpluss"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.9"
strict = true
ignore_missing_imports = true

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
