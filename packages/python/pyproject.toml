[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "palpluss"
version = "0.1.0"
description = "Official PalPluss Python SDK"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
    { name = "PalPluss", email = "dev@palpluss.com" },
]
keywords = ["palpluss", "mpesa", "payments", "kenya", "sdk", "stk-push", "b2c", "mobile-money"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27.0",
]

[project.urls]
Homepage = "https://palpluss.com"
Documentation = "https://docs.palpluss.com"
Repository = "https://github.com/palpluss/palpluss-sdk"
"Bug Tracker" = "https://github.com/palpluss/palpluss-sdk/issues"
Changelog = "https://github.com/palpluss/palpluss-sdk/blob/main/packages/python/CHANGELOG.md"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-httpx>=0.30.0",
    "mypy>=1.9.0",
    "ruff>=0.4.0",
    "build>=1.2.0",
    "twine>=5.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["palpluss"]

[tool.hatch.build.targets.sdist]
include = [
    "palpluss/",
    "README.md",
    "LICENSE",
    "pyproject.toml",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.9"
strict = true
ignore_missing_imports = true

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
