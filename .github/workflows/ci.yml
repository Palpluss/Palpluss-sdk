name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript SDK — Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @palpluss/sdk lint

      - name: Typecheck
        run: pnpm --filter @palpluss/sdk typecheck

      - name: Test
        run: pnpm --filter @palpluss/sdk test

      - name: Build
        run: pnpm --filter @palpluss/sdk build

  python:
    name: Python SDK — Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: packages/python
        run: uv pip install -e ".[dev]" --system

      - name: Lint
        working-directory: packages/python
        run: ruff check palpluss

      - name: Typecheck
        working-directory: packages/python
        run: mypy palpluss

      - name: Test
        working-directory: packages/python
        run: pytest

  php:
    name: PHP SDK — Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install dependencies
        working-directory: packages/php
        run: composer install --no-interaction --prefer-dist

      - name: Test
        working-directory: packages/php
        run: vendor/bin/phpunit

  go:
    name: Go SDK — Vet & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: packages/go/go.sum

      - name: Vet
        working-directory: packages/go
        run: go vet ./...

      - name: Test
        working-directory: packages/go
        run: go test ./... -race

  # On pull requests: require a changeset when TypeScript SDK source files change.
  # Skipped on push-to-main (version PRs have no changeset by design).
  changeset-check:
    name: Changeset — TypeScript SDK
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require changeset for SDK source changes
        run: |
          base="${{ github.base_ref }}"
          changed=$(git diff --name-only "origin/${base}" HEAD)
          if echo "$changed" | grep -qE '^packages/typescript/src/'; then
            echo "TypeScript SDK source changed — verifying changeset is present..."
            pnpm changeset status --since="origin/${base}"
          else
            echo "No SDK source changes detected — changeset not required."
          fi
