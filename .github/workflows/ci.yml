name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript SDK — Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @palpluss/sdk lint

      - name: Typecheck
        run: pnpm --filter @palpluss/sdk typecheck

      - name: Test
        run: pnpm --filter @palpluss/sdk test

      - name: Build
        run: pnpm --filter @palpluss/sdk build

  python:
    name: Python SDK — Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: packages/python
        run: uv pip install -e ".[dev]" --system

      - name: Lint
        working-directory: packages/python
        run: ruff check palpluss

      - name: Typecheck
        working-directory: packages/python
        run: mypy palpluss

      - name: Test
        working-directory: packages/python
        run: pytest
