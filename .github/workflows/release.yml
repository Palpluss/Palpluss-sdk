name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal default — jobs declare only what they actually need.
permissions:
  contents: read

jobs:
  # ── Quality gate ────────────────────────────────────────────────────────────
  # Publish is blocked until every check here passes.
  quality:
    name: Quality Gate — TypeScript SDK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @palpluss/sdk lint

      - name: Typecheck
        run: pnpm --filter @palpluss/sdk typecheck

      - name: Test
        run: pnpm --filter @palpluss/sdk test

      - name: Build
        run: pnpm --filter @palpluss/sdk build

  # ── Release ─────────────────────────────────────────────────────────────────
  # Runs only after the quality gate passes.
  #
  # Publishing uses npm Trusted Publishing (OIDC) — no NPM_TOKEN required.
  # Before the first release, register this workflow as a trusted publisher at:
  #   npmjs.com → @palpluss/sdk → Settings → Trusted Publishers
  #   Workflow filename: release.yml
  #
  # How this works on each push to main:
  #   Pending changesets present → opens / updates a "Version Packages" PR
  #   No pending changesets      → publishes to npm via OIDC (if PR was merged)
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [quality]

    permissions:
      contents: write       # push version commits and tags
      pull-requests: write  # open / update the Version Packages PR
      id-token: write       # npm trusted publishing — OIDC token exchange

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required so changesets can diff correctly.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Step 1 — always: create or update the "Version Packages" PR when
      # changesets are present. No npm auth needed here.
      - name: Create or update Version Packages PR
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 2 — only after the Version PR is merged (no pending changesets):
      # publish to npm using OIDC trusted publishing.
      # publishConfig.provenance=true in package.json activates OIDC auth
      # automatically — no token secret is used or needed.
      - name: Publish to npm
        if: ${{ steps.changesets.outputs.hasChangesets == 'false' }}
        run: pnpm run release
