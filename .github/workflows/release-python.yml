name: Release Python SDK

on:
  push:
    tags:
      - "python-v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # never cancel an in-flight publish

# Minimal default — jobs declare only what they actually need.
permissions:
  contents: read

jobs:
  # ── Quality gate ─────────────────────────────────────────────────────────────
  # Build and publish are blocked until every check here passes.
  quality:
    name: Quality Gate — Python SDK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: packages/python
        run: uv pip install -e ".[dev]" --system

      - name: Lint
        working-directory: packages/python
        run: ruff check palpluss

      - name: Typecheck
        working-directory: packages/python
        run: mypy palpluss

      - name: Test
        working-directory: packages/python
        run: pytest

  # ── Build distributions ───────────────────────────────────────────────────────
  # Produces wheel + sdist and validates metadata before touching PyPI.
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: [quality]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        working-directory: packages/python
        run: python -m build

      - name: Validate distribution metadata
        # Catches README render issues and malformed metadata before publish.
        working-directory: packages/python
        run: twine check --strict dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: packages/python/dist/
          if-no-files-found: error
          retention-days: 7

  # ── Publish to PyPI ───────────────────────────────────────────────────────────
  # Uses PyPI Trusted Publishing (OIDC) — no PYPI_TOKEN secret required.
  #
  # Before the first release, register this workflow as a trusted publisher at:
  #   pypi.org → palpluss → Settings → Publishing → Add a new publisher
  #     Owner:             palpluss
  #     Repository:        palpluss-sdk
  #     Workflow filename: release-python.yml
  #     Environment name:  pypi
  #
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]

    permissions:
      id-token: write  # OIDC token exchange for PyPI trusted publishing

    environment:
      name: pypi
      url: https://pypi.org/project/palpluss/

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No username/password/token needed — OIDC handles authentication.
        # Provenance attestations are generated automatically.
